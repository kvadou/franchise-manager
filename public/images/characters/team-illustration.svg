<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <!-- Background shapes -->
  <circle cx="120" cy="100" r="80" fill="#dbeafe" opacity="0.5"/>
  <circle cx="400" cy="100" r="90" fill="#fef3c7" opacity="0.4"/>
  <circle cx="680" cy="100" r="80" fill="#d1fae5" opacity="0.5"/>

  <!-- Person 1 - Girl with book -->
  <circle cx="120" cy="70" r="22" fill="#fbbf24"/>
  <circle cx="120" cy="70" r="18" fill="#fcd34d"/>
  <!-- Hair -->
  <path d="M102,65 Q105,45 120,42 Q135,45 138,65" fill="#92400e"/>
  <path d="M100,68 Q98,58 105,50" stroke="#92400e" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M140,68 Q142,58 135,50" stroke="#92400e" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Face -->
  <circle cx="113" cy="68" r="2" fill="#1e3a5f"/>
  <circle cx="127" cy="68" r="2" fill="#1e3a5f"/>
  <path d="M115,76 Q120,80 125,76" stroke="#1e3a5f" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- Body -->
  <rect x="105" y="92" width="30" height="40" rx="8" fill="#3b82f6"/>
  <!-- Arms -->
  <line x1="105" y1="100" x2="88" y2="118" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
  <line x1="135" y1="100" x2="152" y2="118" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
  <!-- Book -->
  <rect x="80" y="112" width="18" height="14" rx="2" fill="#ef4444"/>
  <line x1="89" y1="112" x2="89" y2="126" stroke="white" stroke-width="1"/>
  <!-- Legs -->
  <line x1="115" y1="132" x2="112" y2="158" stroke="#1e3a5f" stroke-width="6" stroke-linecap="round"/>
  <line x1="125" y1="132" x2="128" y2="158" stroke="#1e3a5f" stroke-width="6" stroke-linecap="round"/>

  <!-- Person 2 - Boy with lightbulb -->
  <circle cx="280" cy="75" r="20" fill="#fbbf24"/>
  <circle cx="280" cy="75" r="16" fill="#fcd34d"/>
