  <rect x="264" y="58" width="32" height="12" rx="6" fill="#451a03"/>
  <!-- Face -->
  <circle cx="274" cy="73" r="2" fill="#1e3a5f"/>
  <circle cx="286" cy="73" r="2" fill="#1e3a5f"/>
  <path d="M276,80 Q280,83 284,80" stroke="#1e3a5f" stroke-width="1.5" stroke-linecap="round" fill="none"/>
