  <line x1="385" y1="98" x2="368" y2="112" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
  <line x1="415" y1="98" x2="432" y2="112" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
  <!-- Star -->
  <polygon points="432,106 435,112 442,113 437,118 438,125 432,121 426,125 427,118 422,113 429,112" fill="#fbbf24"/>
  <!-- Legs -->
  <line x1="395" y1="132" x2="392" y2="158" stroke="#1e3a5f" stroke-width="6" stroke-linecap="round"/>
  <line x1="405" y1="132" x2="408" y2="158" stroke="#1e3a5f" stroke-width="6" stroke-linecap="round"/>

  <!-- Person 4 - Boy with puzzle -->
  <circle cx="520" cy="75" r="20" fill="#fbbf24"/>
  <circle cx="520" cy="75" r="16" fill="#fcd34d"/>
  <!-- Hair curly -->
  <circle cx="510" cy="62" r="6" fill="#1c1917"/>
  <circle cx="520" cy="58" r="6" fill="#1c1917"/>
  <circle cx="530" cy="62" r="6" fill="#1c1917"/>
  <!-- Face -->
  <circle cx="514" cy="73" r="2" fill="#1e3a5f"/>
  <circle cx="526" cy="73" r="2" fill="#1e3a5f"/>
  <path d="M516,80 Q520,83 524,80" stroke="#1e3a5f" stroke-width="1.5" stroke-linecap="round" fill="none"/>
