  <!-- Arms raised -->
  <line x1="266" y1="102" x2="250" y2="85" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
  <line x1="294" y1="102" x2="310" y2="85" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
  <!-- Lightbulb above -->
  <circle cx="280" cy="42" r="10" fill="#fbbf24" opacity="0.8"/>
  <path d="M276,42 L280,34 L284,42" fill="#fbbf24"/>
  <line x1="280" y1="52" x2="280" y2="55" stroke="#fbbf24" stroke-width="2"/>
  <line x1="270" y1="42" x2="266" y2="42" stroke="#fbbf24" stroke-width="2"/>
  <line x1="290" y1="42" x2="294" y2="42" stroke="#fbbf24" stroke-width="2"/>
  <!-- Legs -->
  <line x1="274" y1="133" x2="272" y2="158" stroke="#1e3a5f" stroke-width="6" stroke-linecap="round"/>
  <line x1="286" y1="133" x2="288" y2="158" stroke="#1e3a5f" stroke-width="6" stroke-linecap="round"/>

  <!-- Person 3 - Girl with star -->
  <circle cx="400" cy="68" r="22" fill="#fbbf24"/>
  <circle cx="400" cy="68" r="18" fill="#fcd34d"/>
