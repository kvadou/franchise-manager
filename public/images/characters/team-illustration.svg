  <circle cx="393" cy="66" r="2" fill="#1e3a5f"/>
  <circle cx="407" cy="66" r="2" fill="#1e3a5f"/>
  <path d="M395,74 Q400,78 405,74" stroke="#1e3a5f" stroke-width="1.5" stroke-linecap="round" fill="none"/>
