  <rect x="506" y="95" width="28" height="38" rx="8" fill="#f97316"/>
  <!-- Arms -->
  <line x1="506" y1="102" x2="490" y2="116" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
  <line x1="534" y1="102" x2="550" y2="116" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
  <!-- Puzzle piece -->
  <rect x="542" y="108" width="16" height="16" rx="2" fill="#2563eb"/>
  <circle cx="550" cy="108" r="4" fill="#2563eb"/>
  <rect x="542" y="112" width="4" height="8" rx="2" fill="#60a5fa"/>
  <!-- Legs -->
  <line x1="514" y1="133" x2="512" y2="158" stroke="#1e3a5f" stroke-width="6" stroke-linecap="round"/>
  <line x1="526" y1="133" x2="528" y2="158" stroke="#1e3a5f" stroke-width="6" stroke-linecap="round"/>

  <!-- Person 5 - Girl jumping -->
  <circle cx="670" cy="62" r="22" fill="#fbbf24"/>
  <circle cx="670" cy="62" r="18" fill="#fcd34d"/>
  <!-- Hair long -->
  <path d="M652,56 Q658,38 670,35 Q682,38 688,56" fill="#dc2626"/>
  <path d="M652,56 Q650,70 654,82" stroke="#dc2626" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M688,56 Q690,70 686,82" stroke="#dc2626" stroke-width="5" stroke-linecap="round" fill="none"/>
  <!-- Face -->
  <circle cx="663" cy="60" r="2" fill="#1e3a5f"/>
  <circle cx="677" cy="60" r="2" fill="#1e3a5f"/>
  <ellipse cx="670" cy="69" rx="5" ry="3" fill="#1e3a5f"/>
  <!-- Body -->
  <rect x="655" y="84" width="30" height="38" rx="8" fill="#ec4899"/>
  <!-- Arms up celebrating -->
  <line x1="655" y1="92" x2="638" y2="72" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
  <line x1="685" y1="92" x2="702" y2="72" stroke="#fcd34d" stroke-width="6" stroke-linecap="round"/>
  <!-- Sparkles -->
  <circle cx="632" cy="65" r="3" fill="#fbbf24"/>
  <circle cx="708" cy="65" r="3" fill="#fbbf24"/>
  <circle cx="670" cy="30" r="2" fill="#fbbf24"/>
  <!-- Legs jumping -->
  <line x1="662" y1="122" x2="655" y2="148" stroke="#1e3a5f" stroke-width="6" stroke-linecap="round"/>
  <line x1="678" y1="122" x2="685" y2="148" stroke="#1e3a5f" stroke-width="6" stroke-linecap="round"/>

  <!-- Ground line -->
  <line x1="60" y1="164" x2="740" y2="164" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.4"/>
