<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Body -->
  <circle cx="40" cy="42" r="28" fill="#2563eb"/>
  <circle cx="40" cy="42" r="24" fill="#3b82f6"/>
  <!-- Face plate -->
  <ellipse cx="40" cy="44" rx="18" ry="16" fill="#e0f2fe"/>
  <!-- Eyes -->
  <circle cx="33" cy="40" r="4" fill="#1e3a5f"/>
  <circle cx="47" cy="40" r="4" fill="#1e3a5f"/>
  <circle cx="34.5" cy="38.5" r="1.5" fill="white"/>
  <circle cx="48.5" cy="38.5" r="1.5" fill="white"/>
  <!-- Smile -->
  <path d="M32,49 Q40,55 48,49" stroke="#1e3a5f" stroke-width="2" stroke-linecap="round" fill="none"/>
  <!-- Antenna -->
  <line x1="40" y1="14" x2="40" y2="8" stroke="#2563eb" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="40" cy="6" r="3.5" fill="#60a5fa"/>
  <circle cx="40" cy="6" r="2" fill="#93c5fd"/>
  <!-- Ears / side sensors -->
  <circle cx="13" cy="38" r="5" fill="#1d4ed8"/>
  <circle cx="13" cy="38" r="3" fill="#60a5fa"/>
  <circle cx="67" cy="38" r="5" fill="#1d4ed8"/>
  <circle cx="67" cy="38" r="3" fill="#60a5fa"/>
  <!-- Cheeks -->
  <circle cx="26" cy="48" r="3" fill="#fbbf24" opacity="0.4"/>
  <circle cx="54" cy="48" r="3" fill="#fbbf24" opacity="0.4"/>
</svg>
